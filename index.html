<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo 演示 — Supabase × 网页应用</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    #app {
      width: 100%;
      max-width: 600px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    /* 添加表单卡片 */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }
    #todo-form {
      display: flex;
      gap: 10px;
    }
    #todo-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    #todo-form input:focus { border-color: #4f46e5; }
    #todo-form button {
      padding: 10px 22px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    #todo-form button:hover { background: #4338ca; }
    /* Todo 列表 */
    #todo-list { list-style: none; }
    .todo-item {
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: box-shadow .2s;
    }
    .todo-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .todo-content {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .todo-content input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }
    .todo-title {
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: #aaa;
    }
    .todo-date {
      font-size: 12px;
      color: #bbb;
      flex-shrink: 0;
      margin-left: auto;
      padding-left: 10px;
    }
    .todo-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .todo-actions button {
      padding: 5px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
      transition: all .15s;
    }
    .todo-actions .edit-btn { color: #4f46e5; }
    .todo-actions .edit-btn:hover {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }
    .todo-actions .delete-btn { color: #ef4444; }
    .todo-actions .delete-btn:hover {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444;
    }
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #bbb;
      font-size: 15px;
    }
    /* 底部 */
    .footer {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      margin-top: 32px;
      padding: 16px;
      border-top: 1px solid #e8e8e8;
    }
    .footer code {
      background: #e8e8e8;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .error-banner {
      background: #fef2f2;
      color: #dc2626;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>📋 Todo</h1>
    <p class="subtitle">Supabase × 网页应用 演示</p>

    <div class="card">
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="添加新的待办事项..." required autofocus>
        <button type="submit">添加</button>
      </form>
    </div>

    <div id="error-banner" class="error-banner"></div>
    <ul id="todo-list">
      <li class="empty-state" id="loading-state">加载中...</li>
    </ul>

    <p class="footer">
      数据存储在 Supabase PostgreSQL · 刷新页面数据不丢失<br>
      启动方式：<code>python3 -m http.server 8080</code> → <code>http://localhost:8080</code>
    </p>
  </div>

  <script>
    // ===== Supabase 初始化 =====
    const SUPABASE_URL = 'https://lqquclhcuhrodnfiardx.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_PjoVd01jkiRu5uQG9_5UYg_fKtI_VKu'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ===== DOM 引用 =====
    const form = document.getElementById('todo-form')
    const input = document.getElementById('todo-input')
    const list = document.getElementById('todo-list')
    const errorBanner = document.getElementById('error-banner')

    // ===== 工具函数 =====
    function escapeHtml(str) {
      const d = document.createElement('div')
      d.textContent = str
      return d.innerHTML
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleString('zh-CN', {
        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      })
    }

    function showError(msg) {
      errorBanner.textContent = msg
      errorBanner.style.display = 'block'
      setTimeout(() => { errorBanner.style.display = 'none' }, 4000)
    }

    // ===== Supabase CRUD =====

    // READ — 获取所有 todo
    async function fetchTodos() {
      const { data, error } = await db
        .from('todos')
        .select('*')
        .order('created_at', { ascending: false })
      if (error) throw error
      return data
    }

    // CREATE — 新增 todo
    async function addTodo(title) {
      const { error } = await db.from('todos').insert({ title })
      if (error) throw error
    }

    // UPDATE — 切换完成状态
    async function toggleTodo(id, isDone) {
      const { error } = await db.from('todos').update({ is_done: isDone }).eq('id', id)
      if (error) throw error
    }

    // UPDATE — 编辑标题
    async function updateTitle(id, title) {
      const { error } = await db.from('todos').update({ title }).eq('id', id)
      if (error) throw error
    }

    // DELETE — 删除 todo
    async function deleteTodo(id) {
      const { error } = await db.from('todos').delete().eq('id', id)
      if (error) throw error
    }

    // ===== 渲染 =====

    function renderTodoItem(todo) {
      const li = document.createElement('li')
      li.className = 'todo-item'
      if (todo.is_done) li.classList.add('done')
      li.dataset.id = todo.id

      li.innerHTML = `
        <div class="todo-content">
          <input type="checkbox" ${todo.is_done ? 'checked' : ''}>
          <span class="todo-title">${escapeHtml(todo.title)}</span>
          <span class="todo-date">${formatDate(todo.created_at)}</span>
        </div>
        <div class="todo-actions">
          <button class="edit-btn">编辑</button>
          <button class="delete-btn">删除</button>
        </div>
      `

      // 事件绑定
      li.querySelector('input[type="checkbox"]').addEventListener('change', async (e) => {
        try {
          await toggleTodo(todo.id, e.target.checked)
          li.classList.toggle('done', e.target.checked)
        } catch (err) {
          e.target.checked = !e.target.checked
          showError('更新失败：' + err.message)
        }
      })

      li.querySelector('.edit-btn').addEventListener('click', async () => {
        const newTitle = prompt('编辑待办事项：', todo.title)
        if (!newTitle || newTitle.trim() === todo.title) return
        try {
          await updateTitle(todo.id, newTitle.trim())
          li.querySelector('.todo-title').textContent = escapeHtml(newTitle.trim())
          todo.title = newTitle.trim()
        } catch (err) {
          showError('编辑失败：' + err.message)
        }
      })

      li.querySelector('.delete-btn').addEventListener('click', async () => {
        if (!confirm('确定删除这条待办事项？')) return
        try {
          await deleteTodo(todo.id)
          li.remove()
          if (list.children.length === 0) showEmptyState()
        } catch (err) {
          showError('删除失败：' + err.message)
        }
      })

      return li
    }

    function renderTodos(todos) {
      list.innerHTML = ''
      if (todos.length === 0) {
        showEmptyState()
        return
      }
      todos.forEach(todo => list.appendChild(renderTodoItem(todo)))
    }

    function showEmptyState() {
      list.innerHTML = '<li class="empty-state">✨ 暂无待办事项，添加一条吧</li>'
    }

    function showLoading() {
      list.innerHTML = '<li class="empty-state">加载中...</li>'
    }

    // ===== 加载数据 =====

    async function loadTodos() {
      showLoading()
      try {
        const todos = await fetchTodos()
        renderTodos(todos)
      } catch (err) {
        showError('加载失败：' + err.message)
        list.innerHTML = '<li class="empty-state">加载失败，请检查网络或 Supabase 配置</li>'
      }
    }

    // ===== 事件绑定 =====

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const title = input.value.trim()
      if (!title) return
      input.value = ''
      try {
        await addTodo(title)
        await loadTodos()  // 重新拉取完整列表，确保 order 正确
      } catch (err) {
        showError('添加失败：' + err.message)
      }
    })

    // ===== 启动 =====

    loadTodos()
  </script>
</body>
</html>
